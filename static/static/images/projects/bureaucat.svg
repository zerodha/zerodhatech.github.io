<svg width="182" height="44" viewBox="0 0 182 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <g transform="scale(1.375)">
    <!-- Cat ears -->
    <path d="M5.5 14L2.5 3L13 10Z" fill="#F59E0B"/>
    <path d="M26.5 14L29.5 3L19 10Z" fill="#F59E0B"/>
    <!-- Inner ears -->
    <path d="M7 12L4.5 5.5L11.5 9.5Z" fill="#D97706"/>
    <path d="M25 12L27.5 5.5L20.5 9.5Z" fill="#D97706"/>
    <!-- Head -->
    <circle cx="16" cy="18" r="11" fill="#F59E0B"/>
    <!-- Glasses - round nerdy frames -->
    <circle cx="11.5" cy="16.5" r="3.8" stroke="#09090B" stroke-width="1" fill="none"/>
    <circle cx="20.5" cy="16.5" r="3.8" stroke="#09090B" stroke-width="1" fill="none"/>
    <!-- Glasses bridge -->
    <path d="M15.3 16C15.5 15.2 16.5 15.2 16.7 16" stroke="#09090B" stroke-width="0.8" fill="none"/>
    <!-- Eyes - big round nerdy eyes -->
    <ellipse cx="11.5" cy="16.8" rx="1.8" ry="2" fill="#09090B"/>
    <ellipse cx="20.5" cy="16.8" rx="1.8" ry="2" fill="#09090B"/>
    <!-- Pupils -->
    <circle cx="11.8" cy="16.2" r="0.9" fill="#F59E0B"/>
    <circle cx="20.8" cy="16.2" r="0.9" fill="#F59E0B"/>
    <!-- Eye glint -->
    <circle cx="12.3" cy="15.7" r="0.45" fill="#FAFAFA"/>
    <circle cx="21.3" cy="15.7" r="0.45" fill="#FAFAFA"/>
    <!-- Nose -->
    <path d="M14.8 21L16 20L17.2 21Z" fill="#B45309"/>
    <!-- Small content smile -->
    <path d="M14 22.5C14.8 23.2 17.2 23.2 18 22.5" stroke="#92400E" stroke-width="0.7" stroke-linecap="round" fill="none"/>
    <!-- Whiskers -->
    <line x1="2" y1="17.5" x2="7.5" y2="19" stroke="#D97706" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="1.5" y1="20.5" x2="7.5" y2="20.5" stroke="#D97706" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="30" y1="17.5" x2="24.5" y2="19" stroke="#D97706" stroke-width="0.5" stroke-linecap="round"/>
    <line x1="30.5" y1="20.5" x2="24.5" y2="20.5" stroke="#D97706" stroke-width="0.5" stroke-linecap="round"/>
  </g>
  <text x="52" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="23" font-weight="700" fill="#09090B">bureaucat</text>
</svg>
